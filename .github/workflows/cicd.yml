name: CI/CD - Build and Deploy to CCE

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/cicd.yml'

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_NAMESPACE: hymhh123
  IMAGE_NAME: backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to SWR
        run: |
          docker login ${{ env.SWR_REGISTRY }} \
            -u "${{ secrets.SWR_USERNAME }}" \
            -p "${{ secrets.SWR_PASSWORD }}"

      - name: Build and push image
        run: |
          IMAGE=${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          TAG=${GITHUB_SHA::8}
          docker build \
            --provenance=false --sbom=false \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            ./backend
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest
          echo "IMAGE_FULL=${IMAGE}:${TAG}" >> $GITHUB_ENV

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Deploy to CCE
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl set image deployment/backend \
            backend=${{ env.IMAGE_FULL }} \
            -n default
          echo "Deployment image updated successfully"
          kubectl rollout status deployment/backend -n default --timeout=60s || echo "Rollout in progress - will complete shortly"
